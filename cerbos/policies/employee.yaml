---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: employee
  rules:
    # Admin can do everything
    - actions: ["create", "read", "update", "delete", "list"]
      effect: EFFECT_ALLOW
      roles:
        - Admin

    # Manager can create, read, update, list (no delete)
    - actions: ["create", "read", "update", "list"]
      effect: EFFECT_ALLOW
      roles:
        - Manager

    # Employee can read, list, and update own records
    - actions: ["read", "list"]
      effect: EFFECT_ALLOW
      roles:
        - Employee

    - actions: ["update"]
      effect: EFFECT_ALLOW
      roles:
        - Employee
      condition:
        match:
          expr: request.resource.attr.created_by == request.principal.id

    # Viewer can read and list
    - actions: ["read", "list"]
      effect: EFFECT_ALLOW
      roles:
        - Viewer
